<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥚 割れる卵</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #fdf6e3;
  --bg2: #faebd0;
  --brown: #8b5e3c;
  --dark: #3d2b1f;
  --egg-shadow: #d4b896;
  --gold: #f0a500;
}

body {
  background: var(--bg);
  font-family: sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, #e8d5b0 1px, transparent 1px);
  background-size: 32px 32px;
  opacity: 0.4;
  pointer-events: none;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
  position: relative;
  z-index: 1;
}

h1 { font-size: 22px; color: var(--dark); font-weight: 900; text-align: center; }
.subtitle { font-size: 13px; color: var(--brown); margin-top: -24px; text-align: center; opacity: 0.7; }

#egg-wrap {
  position: relative;
  width: 180px;
  height: 210px;
  cursor: pointer;
  filter: drop-shadow(0 12px 24px rgba(100,60,20,0.18));
  transition: transform 0.08s;
  user-select: none;
}
#egg-wrap:active { transform: scale(0.95); }
#egg-svg { width: 100%; height: 100%; }

@keyframes shake {
  0%,100% { transform: translateX(0) rotate(0); }
  20% { transform: translateX(-6px) rotate(-2deg); }
  40% { transform: translateX(6px) rotate(2deg); }
  60% { transform: translateX(-4px) rotate(-1deg); }
  80% { transform: translateX(4px) rotate(1deg); }
}
#egg-wrap.shaking { animation: shake 0.25s ease; }

.stats { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.count-display {
  background: var(--bg2);
  border: 2px solid var(--egg-shadow);
  border-radius: 20px;
  padding: 10px 28px;
  font-size: 15px;
  color: var(--dark);
  font-weight: 700;
}
.count-display span { color: var(--gold); font-size: 20px; }
.prob-text { font-size: 11px; color: var(--brown); opacity: 0.6; }

/* 割れた演出 */
#explosion {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  background: rgba(253,246,227,0.97);
}
#explosion.active { display: flex; }

.explosion-egg { font-size: 120px; }
.crack-text { font-size: 52px; font-weight: 900; color: var(--dark); margin-top: 12px; }
.crack-sub { font-size: 16px; color: var(--brown); margin-top: 8px; }

.share-btn {
  margin-top: 32px;
  background: #000;
  color: #fff;
  border: none;
  padding: 14px 40px;
  border-radius: 40px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
}
.share-btn:hover { opacity: 0.85; }

.restart-btn {
  margin-top: 12px;
  background: var(--dark);
  color: var(--bg);
  border: none;
  padding: 14px 40px;
  border-radius: 40px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
}
.restart-btn:hover { opacity: 0.85; }

.confetti {
  position: fixed;
  top: -20px;
  pointer-events: none;
  z-index: 101;
  border-radius: 2px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

.click-burst {
  position: fixed;
  pointer-events: none;
  font-size: 20px;
  font-weight: 900;
  color: var(--brown);
  animation: burstUp 0.6s ease forwards;
  z-index: 50;
}
@keyframes burstUp {
  to { transform: translateY(-50px); opacity: 0; }
}
</style>
</head>
<body>

<div class="container">
  <h1>🥚 奇跡の卵</h1>
  <p class="subtitle">1億回に1回だけ割れる</p>

  <div id="egg-wrap" onclick="hitEgg(event)">
    <svg id="egg-svg" viewBox="0 0 180 210" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="eggGrad" cx="38%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#fdf0d0"/>
          <stop offset="60%" stop-color="#f5e6c8"/>
          <stop offset="100%" stop-color="#dfc49e"/>
        </radialGradient>
      </defs>
      <ellipse cx="90" cy="115" rx="72" ry="88" fill="url(#eggGrad)"/>
      <ellipse cx="70" cy="72" rx="22" ry="14" fill="white" opacity="0.35"/>
      <g id="cracks"></g>
    </svg>
  </div>

  <div class="stats">
    <div class="count-display">たたいた回数: <span id="count">0</span></div>
    <div class="prob-text">確率: 1/100,000,000</div>
  </div>
</div>

<div id="explosion">
  <div class="explosion-egg">🍳</div>
  <div class="crack-text">割　れ　た！</div>
  <div class="crack-sub" id="crack-count-msg"></div>
  <button class="share-btn" onclick="shareTwitter()">𝕏 でシェアする</button>
  <button class="restart-btn" onclick="restart()">もう一度</button>
</div>

<script>
var count = 0;
var crackCount = 0;
var PROB = 100000000;

var crackPaths = [
  "M90,60 L80,85 L95,100",
  "M90,60 L105,80 L98,105",
  "M80,85 L65,95 L72,115",
  "M95,100 L110,120 L100,140",
  "M72,115 L60,130 L70,150",
  "M100,140 L115,155 L105,170",
  "M70,150 L55,165 L65,180"
];

function hitEgg(e) {
  count++;
  document.getElementById('count').textContent = count.toLocaleString();

  var wrap = document.getElementById('egg-wrap');
  wrap.classList.remove('shaking');
  void wrap.offsetWidth;
  wrap.classList.add('shaking');

  spawnBurst(e.clientX, e.clientY);

  if (Math.random() < 0.05 && crackCount < crackPaths.length) {
    addCrack();
  }

  if (Math.random() < 1 / PROB) {
    triggerCrack();
  }
}

function addCrack() {
  var path = document.createElementNS("http://www.w3.org/2000/svg", "path");
  path.setAttribute('d', crackPaths[crackCount]);
  path.setAttribute('stroke', '#5a3e28');
  path.setAttribute('stroke-width', '2');
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke-linecap', 'round');
  document.getElementById('cracks').appendChild(path);
  crackCount++;
}

function spawnBurst(x, y) {
  var texts = ['コン!', 'パカ!', 'ガツ!', 'ドン!', '…'];
  var el = document.createElement('div');
  el.className = 'click-burst';
  el.textContent = texts[Math.floor(Math.random() * texts.length)];
  el.style.left = (x - 20) + 'px';
  el.style.top = (y - 20) + 'px';
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 700);
}

function triggerCrack() {
  document.getElementById('cracks').innerHTML = '';
  for (var i = 0; i < crackPaths.length; i++) {
    var path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute('d', crackPaths[i]);
    path.setAttribute('stroke', '#3d1a08');
    path.setAttribute('stroke-width', '2.5');
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke-linecap', 'round');
    document.getElementById('cracks').appendChild(path);
  }
  setTimeout(function() {
    launchConfetti();
    document.getElementById('explosion').classList.add('active');
    document.getElementById('crack-count-msg').textContent =
      count.toLocaleString() + '回目でついに…！';
  }, 300);
}

function launchConfetti() {
  var colors = ['#f0a500','#e05050','#50b050','#5090e0','#e050c0'];
  for (var i = 0; i < 80; i++) {
    (function(i) {
      setTimeout(function() {
        var el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.width = (6 + Math.random() * 8) + 'px';
        el.style.height = (10 + Math.random() * 6) + 'px';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 4000);
      }, i * 30);
    })(i);
  }
}

function shareTwitter() {
  var text = encodeURIComponent('1億分の1の確率で割れる卵、' + count.toLocaleString() + '回目でついに割れた！🍳\n\n#奇跡の卵\nhttps://jiyu015.github.io/miracle-egg/');
  window.open('https://twitter.com/intent/tweet?text=' + text, '_blank');
}

function restart() {
  count = 0;
  crackCount = 0;
  document.getElementById('count').textContent = '0';
  document.getElementById('cracks').innerHTML = '';
  document.getElementById('explosion').classList.remove('active');
}


</script>
</body>
</html>
